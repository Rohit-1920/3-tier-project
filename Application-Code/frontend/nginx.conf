server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # React app - handle client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
